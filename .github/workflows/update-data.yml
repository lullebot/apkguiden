name: Uppdatera produktdata

on:
  schedule:
    - cron: '0 6 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Checka ut repot
        uses: actions/checkout@v4

      - name: Sätt upp Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Hämta och processa sortimentet
        run: python scripts/update-data.py

      - name: Committa uppdaterad data.json
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data.json
          if git diff --staged --quiet; then
            echo "Ingen förändring i datan – inget att committa."
          else
            git commit -m "🍷 Uppdatera produktdata $(date -u +%Y-%m-%d)"
            git push
          fi
